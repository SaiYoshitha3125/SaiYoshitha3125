name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - uses: Platane/snk@v3
        with:
          github_user_name: SaiYoshitha3125
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=#ff69b4&color_dots=#161b22,#21262d,#30363d,#ff69b4,#ff1493

      - uses: crazy-max/ghaction-github-pages@v2
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
